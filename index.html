<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiplayer Drawing Simulator</title>
    <style>
        body { background: #2c3e50; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        #game-area { position: relative; flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #ecf0f1; }
        canvas#main { background: white; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: crosshair; }
        #minimap-box { position: absolute; top: 15px; left: 15px; border: 2px solid white; border-radius: 6px; overflow: hidden; background: black; }
        #sidebar { width: 300px; background: #34495e; display: flex; flex-direction: column; padding: 20px; border-left: 2px solid #2c3e50; box-shadow: -5px 0 15px rgba(0,0,0,0.2); }
        .section { background: #2c3e50; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; font-size: 14px; color: #3498db; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border: none; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        #btn-con { background: #2ecc71; color: white; }
        #btn-move { background: #3498db; color: white; padding: 15px; font-size: 16px; margin-top: 10px; }
        #btn-clear { background: #e74c3c; color: white; margin-top: auto; }
        button:active { transform: translateY(2px); filter: brightness(0.9); }
        #chat { flex-grow: 1; background: #ecf0f1; color: #2c3e50; border-radius: 4px; padding: 10px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; }
        #status { position: absolute; bottom: 15px; right: 15px; font-weight: bold; color: #e74c3c; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="game-area">
    <canvas id="main" width="600" height="600"></canvas>
    <div id="minimap-box">
        <canvas id="minimap" width="150" height="150"></canvas>
    </div>
    <div id="status">● <span id="st-txt">OFFLINE</span></div>
</div>

<div id="sidebar">
    <div class="section">
        <h3>Connection</h3>
        <input type="text" id="ip" value="localhost" placeholder="IP or Localtunnel URL">
        <input type="text" id="port" value="8001" placeholder="Port (8001 for local)">
        <button id="btn-con">CONNECT & JOIN</button>
    </div>

    <div class="section">
        <h3>Customization</h3>
        <p style="font-size: 11px; color: #bdc3c7; margin-bottom: 5px;">Pick Your Color</p>
        <input type="color" id="color-picker" value="#3498db" style="height: 45px; padding: 2px; cursor: pointer;">
    </div>

    <div class="section" style="flex-grow: 1; display: flex; flex-direction: column;">
        <h3>Room Chat</h3>
        <div id="chat"></div>
        <input type="text" id="chat-in" placeholder="Press Enter to Chat...">
    </div>

    <button id="btn-move">MOVE FORWARD ↑</button>
    <button id="btn-clear">RESET SCREEN (R)</button>
    <p style="font-size: 11px; color: #bdc3c7; text-align: center; margin-top: 10px;">Click canvas to use Arrow Keys</p>
</div>

<script>
(function() {
    const cv = document.getElementById('main'), ctx = cv.getContext('2d');
    const mCv = document.getElementById('minimap'), mCtx = mCv.getContext('2d');
    const stTxt = document.getElementById('st-txt'), stDot = document.getElementById('status');
    const chat = document.getElementById('chat');
    const cp = document.getElementById('color-picker');

    let ws, myId = "local", players = {"local": {x:0, y:0, h:90, c:'#3498db', pen:true}}, lines = [];

    // Handle Color Picker Input
    cp.oninput = (e) => {
        const newCol = e.target.value;
        if(players[myId]) players[myId].c = newCol;
        send('set_color', {color: newCol});
    };

    document.getElementById('btn-con').onclick = () => {
        let host = document.getElementById('ip').value.trim();
        let port = document.getElementById('port').value.trim();
        host = host.replace(/^https?:\/\//, '').replace(/^wss?:\/\//, '').replace(/\/$/, '');
        let protocol = (host.includes('loca.lt') || host.includes('ngrok')) ? 'wss' : 'ws';
        let url = (host === 'localhost' || host === '127.0.0.1') ? `${protocol}://${host}:${port}` : `${protocol}://${host}`;

        stTxt.innerText = "CONNECTING...";
        
        try {
            ws = new WebSocket(url);
            ws.onopen = () => {
                stTxt.innerText = "ONLINE"; stDot.style.color = "#2ecc71";
                ws.send(JSON.stringify({type:'join_room', room:'MAIN'}));
                // Send chosen color on connect
                ws.send(JSON.stringify({type:'set_color', id:myId, color:cp.value}));
            };
            ws.onmessage = (e) => {
                const a = JSON.parse(e.data);
                if(a.type==='assign_id') { delete players["local"]; myId=a.id; players[myId]={x:0,y:0,h:90,c:cp.value}; }
                else if(a.type==='new_player') players[a.id]={x:0,y:0,h:90,c:a.color || '#e74c3c'};
                else if(a.type==='chat') { chat.innerHTML += `<div>${a.msg}</div>`; chat.scrollTop = chat.scrollHeight; }
                else if(a.type==='set_color') { if(players[a.id]) players[a.id].c = a.color; }
                else if(a.type==='move' || a.type==='turn_left' || a.type==='turn_right' || a.type==='clear') {
                    if(a.id !== myId) handleAction(a.id, a.type);
                }
                else if(a.type==='quit') delete players[a.id];
            };
            ws.onclose = () => { stTxt.innerText = "OFFLINE"; stDot.style.color = "#e74c3c"; };
        } catch(err) { console.error("Socket error:", err); }
    };

    function handleAction(id, type) {
        const p = players[id]; if(!p) return;
        if(type === 'move') {
            const rad = p.h * Math.PI / 180, ox = p.x, oy = p.y;
            p.x += 20 * Math.cos(rad); p.y += 20 * Math.sin(rad);
            lines.push({x1:ox, y1:oy, x2:p.x, y2:p.y, c:p.c});
        } else if(type === 'turn_left') p.h += 30;
        else if(type === 'turn_right') p.h -= 30;
        else if(type === 'clear') lines = [];
    }

    const send = (t, d = {}) => {
        if(t !== 'set_color') handleAction(myId, t); 
        if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: t, id: myId, ...d }));
        }
    };

    document.getElementById('btn-move').onclick = () => send('move');
    document.getElementById('btn-clear').onclick = () => send('clear');
    document.getElementById('chat-in').onkeypress = (e) => {
        if(e.key === 'Enter' && e.target.value) { send('chat', {msg: e.target.value}); e.target.value = ''; }
    };

    window.addEventListener('keydown', (e) => {
        if(document.activeElement.tagName === 'INPUT') return;
        if(e.key === "ArrowUp") { e.preventDefault(); send('move'); }
        if(e.key === "ArrowLeft") { e.preventDefault(); send('turn_left'); }
        if(e.key === "ArrowRight") { e.preventDefault(); send('turn_right'); }
        if(e.key.toLowerCase() === "r") send('clear');
    });

    function render() {
        const me = players[myId] || {x:0, y:0};
        const cx = cv.width/2, cy = cv.height/2;
        ctx.clearRect(0,0,cv.width,cv.height);

        lines.forEach(l => {
            ctx.beginPath(); ctx.strokeStyle = l.c; ctx.lineWidth = 3; ctx.lineCap = "round";
            ctx.moveTo(cx + (l.x1 - me.x), cy - (l.y1 - me.y));
            ctx.lineTo(cx + (l.x2 - me.x), cy - (l.y2 - me.y));
            ctx.stroke();
        });

        for(let id in players) {
            let p = players[id]; ctx.save();
            ctx.translate(cx + (p.x - me.x), cy - (p.y - me.y));
            ctx.rotate(-(p.h * Math.PI / 180)); ctx.fillStyle = p.c;
            ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(-10,-10); ctx.lineTo(-10,10); ctx.fill(); ctx.restore();
        }

        mCtx.fillStyle = "black"; mCtx.fillRect(0,0,150,150);
        for(let id in players) {
            let p = players[id];
            mCtx.fillStyle = (id === myId) ? "#2ecc71" : "white";
            mCtx.beginPath(); mCtx.arc(75 + p.x * 0.05, 75 - p.y * 0.05, 3, 0, 7); mCtx.fill();
        }
        requestAnimationFrame(render);
    }
    render();
})();
</script>
</body>
</html>
